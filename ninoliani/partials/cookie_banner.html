  <div class="cookie_banner_actions">
    <button class="cookie_banner_button" type="button" data-cookie-consent="accepted" aria-label="Accept cookies">Accept</button>
    <button class="cookie_banner_button cookie_banner_button_secondary" type="button" data-cookie-consent="declined" aria-label="Decline cookies">Decline</button>
  </div>
</div>
